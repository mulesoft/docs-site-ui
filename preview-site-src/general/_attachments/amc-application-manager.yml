        replicas:
          type: integer
          description: The number of replicas of the deployment.
          format: int32
          example: 1
      description: The target of the deployment.
    DeploymentSpecVersionResponse:
      type: object
      properties:
        version:
          type: string
          description: The date on which the spec was created.
          example: 729fcd1e-11f3-487d-ba2b-cadf5a8e3815
        createdAt:
          type: string
          description: The date on which the spec was created.
          format: date-time
        target:
          $ref: '#/components/schemas/DeploymentDetailTargetResponse'
        application:
          $ref: '#/components/schemas/ApplicationDetailResponse'
    AlertsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AlertResponse'
    AlertHistoryRecordResponse:
      type: object
      properties:
        triggeredAt:
          type: integer
          format: int64
        context:
          type: object
          additionalProperties:
            type: string
        severity:
          type: string
        condition:
          type: object
          additionalProperties:
            type: string
        actions:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
    AlertHistoryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AlertHistoryRecordResponse'
        total:
          type: integer
          format: int32
    Problem:
      type: object
      properties:
        title:
          type: string
        instance:
          type: string
          format: uri
        type:
          type: string
          format: uri
        parameters:
          type: object
          additionalProperties:
            type: object
        status:
          $ref: '#/components/schemas/StatusType'
        detail:
          type: string
    StatusType:
      type: object
      properties:
        statusCode:
          type: integer
          format: int32
        reasonPhrase:
          type: string
    LogFetchingRequest:
      type: object
      properties:
        afterDocId:
          maxLength: 50
          minLength: 0
          type: string
          description: Log entry ID to start reading from
          example: '695566660906301544'
        length:
          maximum: 1000
          minimum: 0
          type: integer
          description: Maximum amount of entries to fetch
          format: int32
        startTime:
          type: integer
          description: Initial epoch date of entries, in milliseconds
          format: int64
          example: 1660446000000
        endTime:
          type: integer
          description: Final epoch date of entries, in milliseconds
          format: int64
          example: 1660446000000
        regexp:
          maxLength: 240
          minLength: 0
          type: string
          description: Regular expression to search entries for by filtering the message content
        descending:
          type: boolean
          description: Enabling descending mode will reverse order, showing earlier entries first. This affects afterDocId.
        replicaId:
          maxItems: 10
          minItems: 0
          type: array
          description: List of replica IDs to filter entries by.
          items:
            type: string
            description: Replica ID to filter entries by
            example: my-mule-app-5b56d6d79d-gb6lr
        logLevel:
          maxItems: 10
          minItems: 0
          type: array
          description: List of log levels to filter by
          items:
            type: string
            description: Log level
            example: ERROR
    StreamingResponseBody:
      type: object
    DiagnosticResponse:
      type: object
      properties:
        actionId:
          type: string
          description: The ID of the action
        timestamp:
          type: integer
          description: Epoch milliseconds timestamp in which the diagnostic was triggered
          format: int64
          example: 1660446000000
        specVersion:
          type: string
          description: Specification version ID against which this diagnostic was triggered
          example: 1d6fa65c-b899-4982-8ad6-c066c2dac8f3
        replicaId:
          type: string
          description: ID of the replica against which this diagnostic was triggered
          example: my-mule-app-5b56d6d79d-gb6lr
        status:
          type: string
          description: Current status of this diagnostic
          enum:
          - SUCCESSFUL
          - PENDING
          - FAILURE

components:
  schemas:
    TrafficSwitchingResponse:
      type: object
      properties:
        isSwitched:
          type: boolean
          description: is the app traffic switched from CloudHub to CH2
          example: true
        switchedTrafficPercent:
          type: integer
          description: number mapped to an integer between 0 and 100
          format: int32
          example: 50
        ch1AppName:
          type: string
          description: cloudhub app name
          example: cloudhub app
        ch2AppName:
          type: string
          description: CH2 app name
          example: ch2 app
        deploymentId:
          type: string
          description: CH2 deployment id
          example: deployment id
    TrafficSwitchingRequest:
      type: object
      properties:
        switchedTraffic:
          type: integer
          description: number mapped to an integer between 0 and 100
          format: int32
          example: 50
    SchedulerResponse:
      type: object
      properties:
        flowName:
          type: string
          description: The name of the flow where the scheduler component resides.
          example: flow-name-1
        enabled:
          type: boolean
          description: 'Enables or disables the scheduler.<br/> The possible values are: true, false'
          example: true
        type:
          type: string
          description: 'Use FixedFrequencyScheduler to trigger a flow at a regular intervals or CronScheduler to trigger a
            flow using a date-time expression.<br/>The possible values are: FixedFrequencyScheduler, CronScheduler'
          example: FixedFrequencyScheduler
        startDelay:
          type: string
          description: Only for FixedFrequencyScheduler or null otherwise.<br/>The amount of time to wait before triggering
            the flow for the first time after the application is started.
          example: '5'
        frequency:
          type: string
          description: Only for FixedFrequencyScheduler or null otherwise.<br/>The frequency at which the Scheduler triggers
            the flow.
          example: '15'
        timeUnit:
          type: string
          description: 'Only for FixedFrequencyScheduler or null otherwise.<br/>The time unit for the values of Frequency
            and Start Delay.<br/>The possible values are: MILLISECONDS, SECONDS, MINUTES, HOURS, DAYS'
          example: MINUTES
          enum:
          - NANOSECONDS
          - MICROSECONDS
          - MILLISECONDS
          - SECONDS
          - MINUTES
          - HOURS
          - DAYS
        expression:
          type: string
          description: Only for CronScheduler or null otherwise.<br/>A date-time expression.
          example: 0 0/5 14 * * ?
        timeZone:
          type: string
          description: Only for CronScheduler or null otherwise.<br/>Java timeZone values are supported.
          example: America/Argentina/Buenos_Aires
    SchedulerResponsePaged:
      type: object
      properties:
        total:
          type: integer
          description: The items list size.
          format: int64
          example: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/SchedulerResponse'
    SchedulerRequest:
      type: object
      properties:
        timeUnit:
          type: string
          description: 'Only for FixedFrequencyScheduler or null otherwise.<br/>The time unit for the values of Frequency
            and Start Delay.<br/>The possible values are: MILLISECONDS, SECONDS, MINUTES, HOURS, DAYS'
          example: MINUTES
          enum:
          - NANOSECONDS
          - MICROSECONDS
          - MILLISECONDS
          - SECONDS
          - MINUTES
          - HOURS
          - DAYS
        frequency:
          type: string
          description: Only for FixedFrequencyScheduler or null otherwise.<br/>The frequency at which the Scheduler triggers
            the flow.
          example: '15'
        startDelay:
          type: string
          description: Only for FixedFrequencyScheduler or null otherwise.<br/>The amount of time to wait before triggering
            the flow for the first time after the application is started.
          example: '5'
        expression:
          type: string
          description: Only for CronScheduler or null otherwise.<br/>A date-time expression.
          example: 0 0/5 14 * * ?
        timeZone:
          type: string
          description: Only for CronScheduler or null otherwise.<br/>Java timeZone values are supported.
          example: America/Argentina/Buenos_Aires
        enabled:
          type: boolean
          description: True to enable the scheduler or false otherwise.
          example: true
        fixedFrequencyScehduler:
          type: boolean
    ApplicationDetailResponse:
      type: object
      properties:
        status:
          type: string
          description: The status of the application.
          example: NOT_RUNNING
          enum:
          - RUNNING
          - NOT_RUNNING
          - SCALING
        desiredState:
          type: string
          description: The desired state of the application.
          example: STOPPED
          enum:
          - PARTIALLY_STARTED
          - DEPLOYMENT_FAILED
          - STARTING
          - STARTED
          - STOPPING
          - STOPPED
          - UNDEPLOYING
          - UNDEPLOYED
          - UPDATED
          - APPLIED
          - APPLYING
          - FAILED
          - DELETED
        ref:
          $ref: '#/components/schemas/ApplicationExchangeIdentifier'
        configuration:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: object
              description: The configuration of the application.
            description: The configuration of the application.
          description: The configuration of the application.
        vCores:
          type: number
          description: The vCores configured for this application. Applies to cloud-only.
        integrations:
          $ref: '#/components/schemas/Integrations'
      description: The application of the deployment.
    ApplicationExchangeIdentifier:
      type: object
      properties:
        groupId:
          type: string
          description: The groupId of the application.
          example: com.mulesoft.arm
        artifactId:
          type: string
          description: The artifactId of the application.
          example: app-noports-mule4-only
        version:
          type: string
          description: The version of the application.
          example: 1.0.31
        packaging:
          type: string
          description: The packaging of the application
          example: jar
      description: The source where the application is stored.
    DeploymentDetailResponse:
      type: object
      properties:
        id:
          type: string
          description: The id of the deployment.
          example: e4899eda-22c9-4546-8ad2-ffde5a3d466d
        name:
          type: string
          description: The name of the deployment.
          example: app-name
        creationDate:

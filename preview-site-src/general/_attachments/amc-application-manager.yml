              schema:
                $ref: '#/components/schemas/Deployment2'
  /organizations/{organizationId}/environments/{environmentId}/deployments/{deploymentId}/schedulers:
    get:
      summary: List schedulers
      description: Retrieves a list of schedulers for the specified deployment. If this path contains no data, then an empty
        list is returned.
      tags:
      - Schedulers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulerResponsePaged'
              example:
                total: 2
                items:
                  - flowName: flow-name-1
                    enabled: true
                    type: FixedFrequencyScheduler
                    startDelay: '5'
                    frequency: '15'
                    timeUnit: MINUTES
                    expression: null
                    timeZone: null
                  - flowName: flow-name-2
                    enabled: true
                    type: CronScheduler
                    startDelay: null
                    frequency: null
                    timeUnit: null
                    expression: 0 0/5 14 * * ?
                    timeZone: America/Argentina/Buenos_Aires
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
    patch:
      summary: Toggle schedulers
      description: Disables or enables a list of schedulers in a deployment.
      tags:
      - Schedulers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SchedulerStatusRequest'
            example:
              - flowName: flow-name-1
                enabled: false
              - flowName: flow-name-2
                enabled: true
        required: true
      responses:
        '204':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string

      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        description: The id of the organization.
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        description: The id of the environment.
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        description: The id of the deployment.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentDetailResponse'
              example:
                id: e4899eda-22c9-4546-8ad2-ffde5a3d466d
                name: app-name
                creationDate: '2024-01-15T10:30:00Z'
                lastModifiedDate: '2024-01-16T14:20:00Z'
                target:
                  provider: MC
                  targetId: 9c237504-4796-401b-9dbd-689f1857edcf
                  deploymentSettings:
                    clustered: false
                    runtimeVersion: 4.3.0:20220523-3
                    lastMileSecurity: false
                  replicas: 1
                status: STARTED
                application:
                  status: RUNNING
                  desiredState: STARTED
                  ref:
                    groupId: com.mulesoft.arm
                    artifactId: app-noports-mule4-only
                    version: 1.0.31
                    packaging: jar
                  vCores: 0.1
                desiredVersion: 0ef171b6-aad1-459b-8720-10c405b05ed1
                replicas:
                  - id: app-replicas-55585bd94c-tl4g6
                    state: STARTED
                    deploymentLocation: rtfc
                    currentDeploymentVersion: 0ef171b6-aad1-459b-8720-10c405b05ed1
                    reason: null
                lastSuccessfulVersion: 0ef171b6-aad1-459b-8720-10c405b05ed1
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentDetailResponse2'
    delete:
      summary: Delete deployment
      description: Deletes the specified deploymentId.
      tags:
      - Deployments
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        description: The id of the organization.
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        description: The id of the environment.
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        description: The id of the deployment.
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
    patch:
      summary: Update deployment
      description: Updates an existing deployment with the provided details.
      tags:
      - Deployments
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        description: The id of the organization.
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        description: The id of the environment.
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        description: The id of the deployment.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDeploymentRequest'
            examples:
              Update vCores:
                description: Update vCores
                value:
                  application:
                    vCores: '0.07'
              Update replicas:
                description: Update replicas
                value:
                  target:
                    replicas: 3
              Update runtime version:
                description: Update runtime version
                value:
                  target:
                    deploymentSettings:
                      runtimeVersion: 4.3.0:20220523-3
              Update application ref:
                description: Update application ref
                value:
                  application:
                    ref:
                      groupId: 66310c16-bce5-43c4-b978-5945ed2f99c5
                      artifactId: app-with-44-schedulers
                      version: 1.0.44
                      packaging: jar
              Update JVM arguments:
                description: Update JVM arguments
                value:
                  target:
                    deploymentSettings:
                      jvm:
                        args: -XX:MaxRAMPercentage=60.0
              Start application:
                description: Start application
                value:
                  application:
                    desiredState: STARTED
              Stop application:
                description: Stop application
                value:
                  application:
                    desiredState: STOPPED
        required: true
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentDetailResponse'
              example:
                id: e4899eda-22c9-4546-8ad2-ffde5a3d466d
                name: app-name
                creationDate: '2024-01-15T10:30:00Z'
                lastModifiedDate: '2024-01-16T14:20:00Z'
                target:

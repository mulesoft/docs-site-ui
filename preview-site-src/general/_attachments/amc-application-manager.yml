openapi: 3.1.0
info:
  title: AMC Apllication Manager API
  version: v2.1.3
servers:
- url: https://anypoint.mulesoft.com/amc/application-manager/api/v2
  description: AMC Apllication Manager API
tags:
- name: Schedulers
  description: Manage RTF and Cloudhub 2.0 schedulers.
- name: Alerts
  description: Manage RTF and Cloudhub 2.0 alerts.
- name: Deployments
  description: Deploy and manage RTF and Cloudhub 2.0 Applications.
- name: TrafficSwitching
  description: Switch application traffic from Cloudhub 1.0 to Cloudhub 2.0
- name: Diagnostics
  description: Provides diagnostic capabilities for Cloudhub 2.0 applications.
- name: Logs
  description: Provides log querying capabilities Cloudhub 2.0 applications.
paths:
  /organizations/{organizationId}/environments/{environmentId}/deployments/{deploymentId}/schedulers/{flowName}:
    put:
      summary: Update scheduler
      description: Updates the scheduler configuration for the specified flow name.
      tags:
      - Schedulers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      - name: flowName
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchedulerRequest'
            example:
              timeUnit: MINUTES
              frequency: '15'
              startDelay: '5'
              expression: null
              timeZone: null
              enabled: true
              fixedFrequencyScehduler: true
        required: true
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulerResponsePaged'
              example:
                total: 1
                items:
                  - flowName: flow-name-1
                    enabled: true
                    type: FixedFrequencyScheduler
                    startDelay: '5'
                    frequency: '15'
                    timeUnit: MINUTES
                    expression: null
                    timeZone: null
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
    delete:
      summary: Reset scheduler
      description: Removes the custom scheduler configuration for the given flow name in the deployment and restores the default
        configuration.
      tags:
      - Schedulers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      - name: flowName
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulerResponsePaged'
              example:
                total: 1
                items:
                  - flowName: flow-name-1
                    enabled: true
                    type: FixedFrequencyScheduler
                    startDelay: '5'
                    frequency: '15'
                    timeUnit: MINUTES
                    expression: null
                    timeZone: null
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
  /organizations/{organizationId}/environments/{environmentId}/deployments:
    get:
      summary: List deployments
      description: Retrieves a list of deployments for the specified query. If the query returns no results, then an empty
        list is returned.
      tags:
      - Deployments
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        description: The id of the organization.
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        description: The id of the environment.
        required: true
        schema:
          type: string
      - name: deploymentQuery
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/DeploymentQuery'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponsePaged'
              example:
                total: 1
                items:
                  - id: e4899eda-22c9-4546-8ad2-ffde5a3d466d
                    name: app-name
                    creationDate: '2024-01-15T10:30:00Z'
                    lastModifiedDate: '2024-01-16T14:20:00Z'
                    target:
                      provider: MC
                      targetId: 9c237504-4796-401b-9dbd-689f1857edcf
                    status: STARTED
                    application:
                      status: RUNNING
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
    post:
      summary: Create deployment
      description: Deploys a new application with the provided data.
      tags:
      - Deployments
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        description: The id of the organization.
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        description: The id of the environment.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostDeploymentRequest'
            example:
              name: app-name
              target:
                provider: MC
                targetId: 9c237504-4796-401b-9dbd-689f1857edcf
                deploymentSettings:
                  clustered: false
                  enforceDeployingReplicasAcrossNodes: false
                  http:
                    inbound:
                      publicUrl: https://app-name.us-e2.cloudhub.io
                      lastMileSecurity: false
                  runtimeVersion: 4.3.0:20220523-3
                  lastMileSecurity: false
                  generateDefaultPublicUrl: true
                replicas: 1
              application:
                desiredState: STARTED
                ref:
                  groupId: com.mulesoft.arm
                  artifactId: app-noports-mule4-only
                  version: 1.0.31
                  packaging: jar
                vCores: 0.1
                objectStoreV2Enabled: true
              desiredVersion: 1.0.0
        required: true
      responses:
        '202':
          description: Accepted
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentDetailResponse'
              example:
                id: e4899eda-22c9-4546-8ad2-ffde5a3d466d
                name: app-name
                creationDate: '2024-01-15T10:30:00Z'
                lastModifiedDate: '2024-01-15T10:30:00Z'
                target:
                  provider: MC
                  targetId: 9c237504-4796-401b-9dbd-689f1857edcf
                  deploymentSettings:
                    clustered: false
                    runtimeVersion: 4.3.0:20220523-3
                    lastMileSecurity: false
                  replicas: 1
                status: STARTING
                application:
                  status: NOT_RUNNING
                  desiredState: STARTED
                  ref:
                    groupId: com.mulesoft.arm
                    artifactId: app-noports-mule4-only
                    version: 1.0.31
                    packaging: jar
                  vCores: 0.1
                desiredVersion: 0ef171b6-aad1-459b-8720-10c405b05ed1
                replicas: []
                lastSuccessfulVersion: null
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
  /organizations/{organizationId}/environments/{environmentId}/deployments/{deploymentId}/schedulers/{flowName}/run:
    post:
      summary: Run scheduler
      description: Triggers a request to executes immediately the scheduler for the given flow name.
      tags:
      - Schedulers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        required: true
        schema:
          type: string
      - name: deploymentId
        in: path
        required: true
        schema:
          type: string
      - name: flowName
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '409':
          description: Deployment not ready
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
  /organizations/{organizationId}/environments/{environmentId}/alerts:
    get:
      summary: List alerts
      tags:
      - Alerts
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        required: true
        schema:
          type: string
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsResponse'
              example:
                data:
                  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    name: Deployment Failed Alert
                    severity: CRITICAL
                    enabled: true
                    organizationId: e4899eda-22c9-4546-8ad2-ffde5a3d466d
                    environmentId: 9c237504-4796-401b-9dbd-689f1857edcf
                    lastModified: 1705312800000
                    createdAt: 1705312800000
                    isSystem: false
                    productName: mc-application
                    condition:
                      resources:
                        - e4899eda-22c9-4546-8ad2-ffde5a3d466d
                      resourceType: mc-application
                      type: deployment-failed
                    actions:
                      - type: email
                        userIds:
                          - user-id-1
                    conditionType: deployment-failed
    post:
      summary: Create alert
      tags:
      - Alerts
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: environmentId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertRequest'
            example:
              name: Deployment Failed Alert
              severity: CRITICAL
              condition:
                resourceType: mc-application
                type: deployment-failed
                resources:
                  - e4899eda-22c9-4546-8ad2-ffde5a3d466d
              actions:
                - type: email
                  userIds:
                    - user-id-1
                  subject: Deployment Failed
                  content: The deployment has failed.
                  emails:
                    - admin@example.com
        required: true
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
              example:
                id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                name: Deployment Failed Alert
                severity: CRITICAL
                enabled: true
                organizationId: e4899eda-22c9-4546-8ad2-ffde5a3d466d
                environmentId: 9c237504-4796-401b-9dbd-689f1857edcf
                lastModified: 1705312800000
                createdAt: 1705312800000
                isSystem: false
                productName: mc-application
                condition:
                  resources:
                    - e4899eda-22c9-4546-8ad2-ffde5a3d466d
                  resourceType: mc-application
                  type: deployment-failed
                actions:
                  - type: email
                    userIds:
                      - user-id-1
                conditionType: deployment-failed
        '400':
          description: Bad Request
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
  /organizations/{organizationId}/environments/{environmentId}/deployments/{deploymentId}:
    get:
      summary: Get deployment
      description: Retrieves a single deployment with the provided id.
      tags:

openapi: 3.1.0
info:
  title: Access Management API
  description: The Access Management API provides endpoints for managing access to resources in the Anypoint Platform.
  version: '1.0'
servers:
- url: https://anypoint.mulesoft.com/accounts/api
paths:
  /authorize:
    post:
      summary: Authorize multiple resources
      description: Authorize for many resources
      requestBody:
        content:
          application/json:
            example:
              resources:
                - namespace: org
                  action: read
                  resource: "/organizations/a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                authorized: true
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    get:
      summary: Authorize single resource
      description: Authorize for a single resource
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
      - name: action
        in: query
        required: true
        schema:
          type: string
      - name: resource
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example: {}
      responses:
        '200':
          description: '200'
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /authorize/client:
    get:
      summary: Authorize client
      parameters:
      - name: client_id
        in: query
        required: true
        schema:
          type: string
      - name: client_secret
        in: query
        required: true
        schema:
          type: string
      - name: namespace
        in: query
        required: true
        schema:
          type: string
      - name: action
        in: query
        required: true
        schema:
          type: string
      - name: resource
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example: {}
      responses:
        '200':
          description: '200'
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /authorize/context:
    post:
      summary: Authorize by context
      description: Get the set of contexts in which the caller can perform an action on resources that match a template
      requestBody:
        content:
          application/json:
            example:
              namespace: org
              action: read
              resource_template: "/organizations/{orgId}"

  /clients:
    x-amf-description: Access to clients
    post:
      summary: Create client
      description: Create a new client
      requestBody:
        content:
          application/json:
            example:
              name: My API Client
              description: Production client for API access
              redirect_uris:
                - https://example.com/callback
              grant_types:
                - authorization_code
              scopes:
                - read
                - write
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: My API Client
                description: Production client for API access
                client_id: a1b2c3d4e5f67890abcdef1234567890
                client_secret: "********"
                redirect_uris:
                  - https://example.com/callback
                grant_types:
                  - authorization_code
                scopes:
                  - read
                  - write
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    get:
      summary: List clients
      description: Get all clients
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: My API Client
                    client_id: a1b2c3d4e5f67890abcdef1234567890
                  - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    name: Analytics Service
                    client_id: b2c3d4e5f6a78901bcdef12345678901
                total: 2
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /clients/{clientId}:
    x-amf-description: Access to a client
    delete:
      summary: Delete client
      description: Deletes a single client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: '200'
        '400':
          description: '400'
        '404':
          description: '404'
        '409':
          description: '409'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    patch:
      summary: Update client
      description: Patches a single client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: resetSecret
        in: query
        description: Asks service to reset secret as part of this operation
        required: true
        schema:
          type: boolean
      requestBody:
        content:
          application/json:
            example:
              name: Updated API Client
              description: Updated production client
      responses:
        '200':
          description: '200'
        '400':
          description: '400'
        '404':
          description: '404'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    get:
      summary: Get client
      description: Get a single client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: My API Client
                description: Production client for API access
                client_id: a1b2c3d4e5f67890abcdef1234567890
                client_secret: "********"
                redirect_uris:
                  - https://example.com/callback
                grant_types:
                  - authorization_code
                scopes:
                  - read
                  - write
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /clients/{clientId}/roles:
    x-amf-description: Access to a client's roles
    delete:
      summary: Unassign roles from client
      description: Unassign a list of roles from a client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
              role_ids:
                - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                - "b2c3d4e5-f6a7-8901-bcde-f12345678901"
      responses:
        '200':
          description: '200'
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    post:
      summary: Assign roles to client
      description: Assign a list of roles to a client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
              role_ids:
                - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                - "b2c3d4e5-f6a7-8901-bcde-f12345678901"
      responses:
        '200':
          description: '200'
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    get:
      summary: List client roles
      description: Return a list of roles that are assigned to a client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                data:
                  - role_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: Organization Administrator
                    description: Full access to the organization
                  - role_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    name: API Creator
                    description: Can create and manage APIs
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /clients/{clientId}/roles/{roleId}:
    delete:
      summary: Unassign role from client
      description: Unassign a role from a client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: roleId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: '200'
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    post:
      summary: Assign role to client
      description: Assign a role to a client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: roleId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
              role_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: '200'
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    get:
      summary: Get client role
      description: Return a role is assigned to a client
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: roleId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                role_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: Organization Administrator
                description: Full access to the organization
        '400':
          description: '400'
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /clients/search:
    post:
      summary: Search clients
      description: Search clients
      requestBody:
        content:
          application/json:
            example:
              query: "API Client"
              limit: 25
              offset: 0
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: My API Client
                    client_id: a1b2c3d4e5f67890abcdef1234567890
                total: 1
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /connectedApplications:
    x-amf-description: Access to connected applications
    post:
      summary: Create connected application
      description: Create a new connected application
      requestBody:
        content:
          application/json:
            example:
              client_name: My Connected App
              grant_types:
                - client_credentials
              redirect_uris: []
              scopes:
                - read:full
              enabled: true
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                client_id: a1b2c3d4e5f67890abcdef1234567890
                client_name: My Connected App
                owner_org_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                grant_types:
                  - client_credentials
                redirect_uris: []
                scopes:
                  - read:full
                enabled: true
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    get:
      summary: List connected applications
      description: Get all connected applications for the organization
      parameters:
      - name: includeUsage
        in: query
        description: flag to indicate whether to return usage statistics
        required: true
        schema:
          type: boolean
          default: false
      - name: orgId
        in: query
        description: Provide an orgId to get all clients from other organization
        schema:
          type: string
      - name: hide_managed
        in: query
        description: Hides the managed connected apps when set to true.
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                data:
                  - client_id: a1b2c3d4e5f67890abcdef1234567890
                    client_name: My Connected App
                    owner_org_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    enabled: true
                total: 1
                offset: 0
                limit: 25
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /connectedApplications/{clientId}:
    x-amf-description: Access to individual connected application
    delete:
      summary: Delete connected application
      description: Deletes a single connected application
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Connected application was deleted
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    patch:
      summary: Update connected application
      description: Patches a single connected application
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: resetSecret
        in: query
        description: Asks service to reset secret as part of this operation
        schema:
          type: boolean
          default: false
      requestBody:
        content:
          application/json:
            example:
              client_name: Updated Connected App
              enabled: false
      responses:
        '200':
          description: Connected application was successfully updated
          content:
            application/json:
              example:
                client_id: a1b2c3d4e5f67890abcdef1234567890
                client_name: Updated Connected App
                owner_org_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                enabled: false
        '404':
          description: Connected application with that clientId could not be found
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    get:
      summary: Get connected application
      description: Get a single connected application
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: includeUsage
        in: query
        description: flag to indicate whether to return usage statistics
        required: true
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: '200'
          content:
            application/json:
              example:
                client_id: a1b2c3d4e5f67890abcdef1234567890
                client_name: My Connected App
                owner_org_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                grant_types:
                  - client_credentials
                redirect_uris: []
                scopes:
                  - read:full
                enabled: true
        '404':
          description: Connected application with that clientId could not be found
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

  /connectedApplications/{clientId}/scopes:
    x-amf-description: 'Routes for operationg upon context-aware scopes assigned directly to the client''s identity,

      only for use with the client_credentials grant type. Orthogonal to the set of scopes associated

      with user authorizations.'
    delete:
      summary: Remove connected application scopes
      description: 'Unassigns context-aware scopes from the connected application.

        Scopes must exactly match in order to be removed.'
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
              scopes:
                - read:full
                - write:full
      responses:
        '204':
          description: Connected application scopes were successfully unassigned
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    patch:
      summary: Update connected application scopes
      description: 'Assigns additional context-aware scopes to the connected application.

        Does not unassign any existing scopes.

        Duplicate entries are ignored.'
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
              scopes:
                - read:full
                - write:full
      responses:
        '204':
          description: Connected application scopes were successfully assigned
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    put:
      summary: Replace connected application scopes
      description: Replaces the entire list of context-aware scopes assigned to the connected application
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
              scopes:
                - read:full
                - write:full
      responses:
        '204':
          description: Connected application scopes were successfully replaced
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:

  /organizations/{orgId}/environments:
    x-amf-description: Environments from an organization
    post:
      summary: Create organization environment
      description: Creates an environment
      parameters:
      - name: orgId
        in: path
        required: true
        description: The ID of the organization in GUID format
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
              name: Production
              type: production
              isProduction: true
      responses:
        '201':
          description: Environment created. Returns the newly created environment
          content:
            application/json:
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: Production
                organizationId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                type: production
                isProduction: true
                clientId: client-a1b2c3d4
        '400':
          description: Failed to create the environment because of invalid input. Often times it is the name containing invalid
            characters (names must be alpha-numeric and between 2 & 65 characters long).
        '403':
          description: The organization is not entitled to be able to create new environments.
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number

    get:
      summary: List organization environments
      description: Returns all matching environments
      parameters:
      - name: orgId
        in: path
        required: true
        description: The ID of the organization in GUID format
        schema:
          type: string
      - name: expandAll
        in: query
        description: Returns all environments within the rootOrg that caller has access to. If this is true, orgId has to
          be a valid rootOrgId.
        schema:
          type: string
      - name: type
        in: query
        description: The type of environment - production, sandbox, or/or design
        schema:
          type: string
      - name: isProduction
        in: query
        description: Whether returns only production or non-production environments
        schema:
          type: boolean
      - name: name
        in: query
        description: Case sensitive match on the environment name
        schema:
          type: string
      responses:
        '200':
          description: Returns environments
          content:
            application/json:
              example:
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: Production
                    organizationId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    type: production
                    isProduction: true
                  - id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                    name: Sandbox
                    organizationId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    type: sandbox
                    isProduction: false
                total: 2
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
